# iList.ng Laravel Virtual Host Configuration
# Add this to: C:\xampp\apache\conf\extra\httpd-vhosts.conf

<VirtualHost *:80>
    DocumentRoot "C:/Users/USER/OneDrive/Desktop/Classified ads/backend/public"
    ServerName ilist.local
    ServerAlias www.ilist.local
    <Directory "C:/Users/USER/OneDrive/Desktop/Classified ads/backend">
        AllowOverride All
        Require all granted
    </Directory>
    
    <Directory "C:/Users/USER/OneDrive/Desktop/Classified ads/backend/public">
        RewriteEngine On
        RewriteBase /
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^(.*)$ /index.php [QSA,L]
    </Directory>
    
    ErrorLog "logs/ilist-error.log"
    CustomLog "logs/ilist-access.log common
</VirtualHost>
